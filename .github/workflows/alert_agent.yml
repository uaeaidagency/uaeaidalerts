name: UAE Aid Alert Agent

# Runs every hour. Can also be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '0 * * * *'   # top of every hour, 24/7
  workflow_dispatch:       # manual "Run workflow" button in GitHub UI
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal           # only alert on new transitions (production)
          - test-submission  # send a test submission alert right now
          - test-email       # send a test tier-escalation alert right now
          - force            # alert on ALL current Tier 1/2 crises

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit state files back to the repo

    steps:
      # ── 1. Check out the repo ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Install Python dependencies ───────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Write credentials from GitHub Secrets ─────────────────────
      #    Secrets are never stored in the repo — they live in
      #    Settings → Secrets and variables → Actions on GitHub.
      - name: Write SMTP credentials
        run: |
          cat > tier2_alert_agent/smtp.env << 'EOF'
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
          EOF

      - name: Write Telegram credentials
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            > tier2_alert_agent/telegram.env

      # ── 5. Refresh crisis data from live APIs ────────────────────────
      #    update_crises.py pulls GDACS + UN FTS data and updates
      #    01_Active_Crises.csv and 02_Humanitarian_Indicators.csv
      #    before the alert agent reads them.
      - name: Refresh crisis data from live APIs
        run: python update_crises.py

      - name: Commit refreshed CSVs
        run: |
          git config user.name  "UAE Aid Alert Bot"
          git config user.email "bot@uaeaid-alerts.github"
          git add 01_Active_Crises.csv 02_Humanitarian_Indicators.csv
          git diff --staged --quiet \
            || git commit -m "chore: refresh crisis data from APIs [skip ci]"

      # ── 6. Run the alert agent ────────────────────────────────────────
      - name: Run alert agent
        run: |
          MODE="${{ github.event.inputs.mode || 'normal' }}"
          if   [ "$MODE" = "test-submission" ]; then
            python tier2_alert_agent/run_check.py --test-submission
          elif [ "$MODE" = "test-email" ]; then
            python tier2_alert_agent/run_check.py --test-email
          elif [ "$MODE" = "force" ]; then
            python tier2_alert_agent/run_check.py --force
          else
            python tier2_alert_agent/run_check.py
          fi

      # ── 7. Persist state back to the repo ────────────────────────────
      #    The agent writes to tier2_alert_agent/state/ to remember which
      #    submissions / approvals / tier transitions it has already alerted
      #    on. Committing this back ensures the next hourly run doesn't
      #    re-alert on the same events.
      - name: Commit state changes
        run: |
          git config user.name  "UAE Aid Alert Bot"
          git config user.email "bot@uaeaid-alerts.github"
          git add tier2_alert_agent/state/
          git diff --staged --quiet \
            || git commit -m "chore: update agent state [skip ci]"
          git push
